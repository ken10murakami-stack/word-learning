<div class="data-controls">
    <button class="btn-outline" onclick="app.exportJSON()">データの保存</button>
    <button class="btn-outline" onclick="document.getElementById('import-file').click()">データの読込</button>
    <input type="file" id="import-file" class="hidden" onchange="app.importJSON(event)">
    
    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
    
    <div class="reset-section" style="font-size: 0.8rem; background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px solid #fed7d7;">
        <p style="margin-top:0; color: #c53030; font-weight: bold;">範囲指定リセット</p>
        <div style="display: flex; gap: 5px; margin-bottom: 5px;">
            <select id="reset-level-select" style="font-size: 0.75rem; padding: 5px;"></select>
            <select id="reset-pos-select" style="font-size: 0.75rem; padding: 5px;">
                <option value="all">全品詞</option>
            </select>
        </div>
        <button class="btn-danger-outline" onclick="app.resetSpecificProgress()" style="width: 100%; padding: 8px; font-size: 0.75rem; background: white; border: 1px solid #fc8181; color: #c53030;">選択した範囲をリセット</button>
    </div>
</div>
