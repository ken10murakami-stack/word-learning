<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学英単語学習 Pro</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #4caf50;
            --danger: #f44336;
            --bg: #f4f7f9;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* ヘッダー・フィルタ */
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; }
        .filter-section { display: flex; gap: 10px; margin-bottom: 15px; }
        .control-group { flex: 1; text-align: left; }
        .control-group label { font-size: 0.8rem; display: block; margin-bottom: 4px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 0.9rem; }

        /* ボタン */
        .mode-selection { display: flex; gap: 10px; margin-bottom: 25px; }
        button { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .btn-main { flex: 1; padding: 15px; background: var(--primary); color: white; font-size: 1rem; }
        .btn-primary { width: 100%; padding: 18px; background: var(--primary); color: white; font-size: 1.2rem; }
        .btn-back { background: transparent; color: var(--primary); padding: 5px; }
        .btn-correct { background: var(--success); color: white; flex: 1; padding: 15px; }
        .btn-wrong { background: var(--danger); color: white; flex: 1; padding: 15px; }
        .btn-outline { background: #eee; color: #666; font-size: 0.75rem; padding: 8px 12px; margin: 2px; }

        /* 統計表示 */
        .stats-section { margin-top: 20px; text-align: left; }
        .stats-section h3 { font-size: 0.9rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-item { background: #f0f4f8; padding: 8px; border-radius: 8px; font-size: 0.75rem; border-left: 4px solid var(--primary); }

        /* データ操作・リセット */
        .data-controls { margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 20px; }
        .reset-box { margin-top: 15px; padding: 15px; background: #fff5f5; border: 1px solid #feb2b2; border-radius: 10px; }
        .reset-title { color: #c53030; font-weight: bold; font-size: 0.8rem; margin: 0 0 10px 0; text-align: left; }
        .reset-inputs { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-reset { width: 100%; padding: 8px; background: white; border: 1px solid #f56565; color: #c53030; border-radius: 5px; font-size: 0.75rem; }

        /* クイズカード */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card { border: 2px solid #f0f4f8; border-radius: 20px; padding: 40px 15px; min-height: 220px; margin-bottom: 20px; display: flex; flex-direction: column; justify-content: center; }
        .tag-container { margin-bottom: 15px; }
        .tag { background: #e2e8f0; padding: 4px 10px; border-radius: 15px; font-size: 0.7rem; margin: 0 3px; }
        #question-text { font-size: 2rem; margin: 0; }
        #answer-text { font-size: 1.8rem; color: var(--danger); margin: 10px 0; }
        #reading-text { color: #666; font-size: 1rem; }
        .controls { display: flex; flex-direction: column; gap: 10px; }

        /* ローディング */
        #loading-overlay { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>単語データを読み込み中...</p>
    </div>

    <div class="container">
        <div id="setup-screen">
            <h1>中学英単語学習</h1>
            
            <div class="filter-section">
                <div class="control-group">
                    <label>レベル:</label>
                    <select id="level-select"></select>
                </div>
                <div class="control-group">
                    <label>品詞:</label>
                    <select id="pos-select"></select>
                </div>
            </div>

            <div class="mode-selection">
                <button class="btn-main" onclick="app.start('en-jp')">英 → 日</button>
                <button class="btn-main" onclick="app.start('jp-en')">日 → 英</button>
            </div>

            <div class="stats-section">
                <h3>達成状況 (%)</h3>
                <div id="stats-container" class="stats-grid"></div>
            </div>
            
            <div class="data-controls">
                <div class="backup-btns">
                    <button class="btn-outline" onclick="app.exportJSON()">データの保存</button>
                    <button class="btn-outline" onclick="document.getElementById('import-file').click()">データの読込</button>
                    <input type="file" id="import-file" class="hidden" onchange="app.importJSON(event)">
                </div>

                <div class="reset-box">
                    <p class="reset-title">範囲指定リセット</p>
                    <div class="reset-inputs">
                        <select id="reset-level-select"></select>
                        <select id="reset-pos-select"></select>
                    </div>
                    <button class="btn-reset" onclick="app.resetSpecificProgress()">選択した範囲をリセット</button>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <button class="btn-back" onclick="app.goHome()">◀ 戻る</button>
                <span id="progress-text" style="font-size: 0.9rem; color: #666;">0 / 0</span>
            </div>
            
            <div class="card">
                <div class="tag-container">
                    <span id="pos-tag" class="tag">品詞</span>
                    <span id="level-tag" class="tag">Lv</span>
                </div>
                <h2 id="question-text">Question</h2>
                
                <div id="answer-zone" class="hidden">
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                    <h1 id="answer-text">Answer</h1>
                    <p id="reading-text"></p>
                </div>
            </div>

            <div class="controls">
                <button id="show-btn" class="btn-primary" onclick="app.showAnswer()">答えを見る</button>
                <div id="judge-btns" class="hidden" style="display: flex; gap: 10px;">
                    <button class="btn-wrong" onclick="app.next(false)">間違えた</button>
                    <button class="btn-correct" onclick="app.next(true)">正解！</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★ここにあなたのGASのURLを入れてください
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx6-t--g61Li6_cGIta5JDbwfpejAV9FJTZ45WqFxIM0oHQMyYoUWE7XLtk7eP2WeU/exec";

        const app = {
            masterWords: [],
            userProgress: {},
            currentQueue: [],
            currentIndex: 0,
            mode: 'en-jp',

            async init() {
                const overlay = document.getElementById('loading-overlay');
                try {
                    const response = await fetch(GAS_API_URL);
                    const rawData = await response.json();
                    
                    this.masterWords = rawData.map(item => {
                        const newItem = {};
                        for (let key in item) {
                            const cleanKey = key.trim();
                            const val = item[key];
                            if (cleanKey === "ID") newItem.id = val;
                            if (cleanKey === "英語" || cleanKey === "English") newItem.en = val;
                            if (cleanKey === "意味" || cleanKey === "日本語" || cleanKey === "Meaning") newItem.jp = val;
                            if (cleanKey === "読み方" || cleanKey === "読み") newItem.read = val;
                            if (cleanKey === "品詞") newItem.pos = val;
                            if (cleanKey === "レベル") newItem.lv = val;
                        }
                        return newItem;
                    }).filter(item => item.en);

                    const saved = localStorage.getItem('word_app_progress_v1');
                    this.userProgress = saved ? JSON.parse(saved) : {};

                    this.setupUI();
                    this.updateStats();
                    overlay.classList.add('hidden');
                } catch (e) {
                    console.error(e);
                    document.querySelector('#loading-overlay p').innerText = "エラー: データの取得に失敗しました。";
                }
            },

            setupUI() {
                const levels = [...new Set(this.masterWords.map(w => w.lv))].filter(l => l).sort((a,b) => a-b);
                const poses = [...new Set(this.masterWords.map(w => w.pos))].filter(p => p);
                
                const lSelect = document.getElementById('level-select');
                const rlSelect = document.getElementById('reset-level-select');
                lSelect.innerHTML = ""; rlSelect.innerHTML = "";
                levels.forEach(l => {
                    lSelect.add(new Option(`レベル ${l}`, l));
                    rlSelect.add(new Option(`レベル ${l}`, l));
                });

                const pSelect = document.getElementById('pos-select');
                const rpSelect = document.getElementById('reset-pos-select');
                pSelect.innerHTML = '<option value="all">すべての品詞</option>';
                rpSelect.innerHTML = '<option value="all">全品詞</option>';
                poses.forEach(p => {
                    pSelect.add(new Option(p, p));
                    rpSelect.add(new Option(p, p));
                });
            },

            updateStats() {
                const container = document.getElementById('stats-container');
                container.innerHTML = "";
                const levels = [...new Set(this.masterWords.map(w => w.lv))].filter(l => l).sort((a,b) => a-b);
                const targetPoses = ["名詞", "動詞", "形容詞", "副詞"];

                levels.forEach(l => {
                    targetPoses.forEach(p => {
                        const words = this.masterWords.filter(w => w.lv == l && w.pos == p);
                        if (words.length === 0) return;
                        const correctCount = words.filter(w => this.userProgress[w.id] === 1).length;
                        const percent = Math.round((correctCount / words.length) * 100);
                        const div = document.createElement('div');
                        div.className = "stat-item";
                        div.innerHTML = `Lv${l} [${p}]<br><b>${percent}%</b> (${correctCount}/${words.length})`;
                        container.appendChild(div);
                    });
                });
            },

            start(selectedMode) {
                const lv = document.getElementById('level-select').value;
                const pos = document.getElementById('pos-select').value;
                this.mode = selectedMode;
                let filtered = this.masterWords.filter(w => w.lv == lv);
                if (pos !== "all") filtered = filtered.filter(w => w.pos === pos);
                if (filtered.length === 0) return alert("対象の単語がありません。");

                this.currentQueue = filtered.sort((a, b) => {
                    const sA = this.userProgress[a.id] || 0;
                    const sB = this.userProgress[b.id] || 0;
                    if (sA !== sB) return sA - sB;
                    return Math.random() - 0.5;
                });

                this.currentIndex = 0;
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                this.renderQuiz();
            },

            renderQuiz() {
                const word = this.currentQueue[this.currentIndex];
                document.getElementById('progress-text').innerText = `${this.currentIndex + 1} / ${this.currentQueue.length}`;
                document.getElementById('pos-tag').innerText = word.pos || '-';
                document.getElementById('level-tag').innerText = `Lv.${word.lv}`;
                document.getElementById('question-text').innerText = (this.mode === 'en-jp') ? word.en : word.jp;
                document.getElementById('answer-text').innerText = (this.mode === 'en-jp') ? word.jp : word.en;
                document.getElementById('reading-text').innerText = word.read || '';
                document.getElementById('answer-zone').classList.add('hidden');
                document.getElementById('judge-btns').classList.add('hidden');
                document.getElementById('show-btn').classList.remove('hidden');
            },

            showAnswer() {
                document.getElementById('answer-zone').classList.remove('hidden');
                document.getElementById('judge-btns').classList.remove('hidden');
                document.getElementById('show-btn').classList.add('hidden');
            },

            next(isCorrect) {
                const word = this.currentQueue[this.currentIndex];
                this.userProgress[word.id] = isCorrect ? 1 : -1;
                localStorage.setItem('word_app_progress_v1', JSON.stringify(this.userProgress));
                this.currentIndex++;
                if (this.currentIndex < this.currentQueue.length) {
                    this.renderQuiz();
                } else {
                    alert("範囲内の学習が完了しました！");
                    this.goHome();
                }
            },

            goHome() {
                this.updateStats();
                document.getElementById('setup-screen').classList.remove('hidden');
                document.getElementById('quiz-screen').classList.add('hidden');
            },

            resetSpecificProgress() {
                const lv = document.getElementById('reset-level-select').value;
                const pos = document.getElementById('reset-pos-select').value;
                const label = pos === "all" ? `レベル${lv}の全単語` : `レベル${lv}の${pos}`;
                if(!confirm(`${label} の学習記録をリセットしますか？`)) return;
                
                let targets = this.masterWords.filter(w => w.lv == lv);
                if (pos !== "all") targets = targets.filter(w => w.pos === pos);
                targets.forEach(w => delete this.userProgress[w.id]);
                
                localStorage.setItem('word_app_progress_v1', JSON.stringify(this.userProgress));
                this.updateStats();
                alert("リセット完了しました");
            },

            exportJSON() {
                const dataStr = JSON.stringify(this.userProgress);
                const blob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'study_data.json';
                a.click();
            },

            importJSON(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.userProgress = JSON.parse(e.target.result);
                    localStorage.setItem('word_app_progress_v1', JSON.stringify(this.userProgress));
                    this.updateStats();
                    alert("データを読み込みました");
                };
                reader.readAsText(file);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
