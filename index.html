<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学英単語学習 Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>スプレッドシートからデータを取得中...</p>
    </div>

<div class="stats-section">
    <h3>達成状況 (%)</h3>
    <div id="stats-container" class="stats-grid"></div> </div>
            
            <div class="filter-section">
                <div class="control-group">
                    <label>レベル:</label>
                    <select id="level-select"></select>
                </div>
                <div class="control-group">
                    <label>品詞:</label>
                    <select id="pos-select">
                        <option value="all">すべての品詞</option>
                    </select>
                </div>
            </div>

            <div class="mode-selection">
                <button class="btn-main" onclick="app.start('en-jp')">英 → 日</button>
                <button class="btn-main" onclick="app.start('jp-en')">日 → 英</button>
            </div>

            <div class="stats-section">
                <h3>達成状況 (%)</h3>
                <div id="stats-container" class="stats-grid"></div>
            </div>
            
            <div class="data-controls">
                <button class="btn-outline" onclick="app.exportJSON()">JSONでバックアップ</button>
                <button class="btn-outline" onclick="document.getElementById('import-file').click()">JSONから復元</button>
                <input type="file" id="import-file" class="hidden" onchange="app.importJSON(event)">
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <button class="btn-back" onclick="app.goHome()">◀ ホームへ</button>
                <span id="progress-text">0 / 0</span>
            </div>
            
            <div class="card" id="quiz-card">
                <div class="tag-container">
                    <span id="pos-tag" class="tag">品詞</span>
                    <span id="level-tag" class="tag level-tag">Lv</span>
                </div>
                <h2 id="question-text">Question</h2>
                
                <div id="answer-zone" class="hidden">
                    <hr>
                    <h1 id="answer-text">Answer</h1>
                    <p id="reading-text">よみがな</p>
                </div>
            </div>

            <div class="controls">
                <button id="show-btn" class="btn-primary" onclick="app.showAnswer()">答えを見る</button>
                <div id="judge-btns" class="hidden">
                    <button class="btn-wrong" onclick="app.next(false)">間違えた</button>
                    <button class="btn-correct" onclick="app.next(true)">正解！</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
